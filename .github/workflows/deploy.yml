name: Deploy to EC2

on:
  push:
    branches: ["main", "ci-setup"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~
            if [ -d "student-portal" ]; then
              cd student-portal && git pull
            else
              git clone https://github.com/sumedhaj2706-tech/student-portal.git
              cd student-portal
            fi
            sudo docker stop $(docker ps -q) || true
            sudo docker rm $(docker ps -aq) || true
            sudo docker build -t student-portal .
            sudo docker run -d -p 5000:5000 student-portal
